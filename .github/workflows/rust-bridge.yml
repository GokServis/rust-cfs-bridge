name: rust-bridge

on:
  push:
    paths:
      - "rust-bridge/**"
      - "bridge-ui/**"
      - ".github/workflows/rust-bridge.yml"
      - ".pre-commit-config.yaml"
  pull_request:
    paths:
      - "rust-bridge/**"
      - "bridge-ui/**"
      - ".github/workflows/rust-bridge.yml"
      - ".pre-commit-config.yaml"

jobs:
  rust-bridge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-bridge
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Line coverage (all targets, minimum 90%)
        run: cargo llvm-cov --all-targets --fail-under-lines 90

  bridge-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bridge-ui/package-lock.json

      - name: npm ci
        run: npm ci

      - name: eslint
        run: npm run lint

      - name: build
        run: npm run build

      - name: test + coverage (minimum 90% lines)
        run: npm run test:coverage
