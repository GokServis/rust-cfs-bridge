# Dev: bind-mounts the repo over /app so you can edit sources on the host.
# Build artifacts must exist under the mounted tree (run once inside the container):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml run --rm bridge-server bash
#   cd /app/cfs && make BUILDTYPE=release prep && make && make install
#   cd /app/rust-bridge && cargo build --release
# Then: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  bridge-server:
    container_name: rust-cfs-bridge-dev-server
    volumes:
      - .:/app
  bridge-ui:
    container_name: rust-cfs-bridge-dev-ui
  cfs:
    container_name: rust-cfs-bridge-dev-cfs
    volumes:
      - .:/app
